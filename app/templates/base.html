<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Expense Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand fw-bold" href="/">Expense Tracker</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <!-- Left Menu -->
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="/">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" href="/dashboard">Dashboard</a>
                        </li>
                    </ul>

                    <!-- Right Menu -->
                    <ul class="navbar-nav ms-auto" id="navbarRight">
                        <li class="nav-item me-2" id="registerBtn">
                            <a class="btn btn-outline-success" href="/register">
                                <i class="bi bi-person-plus"></i> Register
                            </a>
                        </li>
                        <li class="nav-item" id="loginBtn">
                            <a class="btn btn-outline-primary" href="/login">
                                <i class="bi bi-box-arrow-in-right"></i> Login
                            </a>
                        </li>
                        <li class="nav-item d-none" id="logoutBtn">
                            <button class="btn btn-outline-danger" id="logoutAction">
                                <i class="bi bi-box-arrow-right"></i> Logout
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Page Content -->
    <main class="flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-3 mt-auto">
        <div class="container text-center">
            <p class="mb-1">© 2025 Expense Tracker | Built with Python</p>
            <a href="https://github.com/Bharat-Panchal15" class="text-white me-3 text-decoration-none" target="_blank">
                <i class="bi bi-github"></i> GitHub
            </a>
            <a href="https://linkedin.com/in/yourprofile" class="text-white text-decoration-none" target="_blank">
                <i class="bi bi-linkedin"></i> LinkedIn
            </a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}
        <script src="{{ url_for('static',filename='navbar.js') }}"></script>
    {% endblock %}
</body>
</html>
